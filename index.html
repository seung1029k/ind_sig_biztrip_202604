<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>인도네시아 및 싱가폴 출장 2026년 4월</title>
  <style>
    :root {
      --navy: #16233f;
      --orange: #f37321;
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #6b7280;
      --line: rgba(22, 35, 63, 0.1);
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: calc(20px + env(safe-area-inset-top)) 18px calc(24px + env(safe-area-inset-bottom));
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(243, 115, 33, 0.12), transparent 30%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(760px, 100%);
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      padding: 30px 24px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.15;
      letter-spacing: -0.04em;
      color: var(--navy);
      margin-bottom: 10px;
    }

    .lead {
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .menu {
      display: grid;
      gap: 12px;
    }

    .menu-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 18px;
      border-radius: 20px;
      background: #fffaf5;
      border: 1px solid rgba(243, 115, 33, 0.16);
      min-height: 58px;
      -webkit-tap-highlight-color: transparent;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .menu-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(243, 115, 33, 0.12);
      border-color: rgba(243, 115, 33, 0.28);
    }

    .menu-main {
      min-width: 0;
    }

    .menu-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--navy);
      line-height: 1.25;
      word-break: keep-all;
    }

    .menu-sub {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .menu-arrow {
      flex-shrink: 0;
      font-size: 22px;
      font-weight: 800;
      color: var(--orange);
    }

    .sub-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .sub-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
      -webkit-tap-highlight-color: transparent;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .card {
        border-radius: 22px;
        padding: 24px 18px;
      }

      .menu-link {
        align-items: flex-start;
        padding: 16px;
      }

      .menu-title {
        font-size: 18px;
      }

      .menu-sub,
      .lead {
        font-size: 14px;
      }

      .sub-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="eyebrow">Business Trip</div>
      <h1>인도네시아 및 싱가폴 출장 2026년 4월</h1>
      <p class="lead">원하시는 방식처럼 심플하게 시작할 수 있도록 정리했습니다. 아래 1번을 누르면 메인 포털로 들어갑니다.</p>

      <div class="menu">
        <a class="menu-link" href="IDN_SG_Portal.html">
          <div class="menu-main">
            <div class="menu-title">1. 인도네시아 및 싱가폴 출장 2026년 4월</div>
            <div class="menu-sub">IDN_SG_Portal로 이동</div>
          </div>
          <div class="menu-arrow">›</div>
        </a>
      </div>

      <div class="sub-links">
        <a class="sub-link" href="trip_itinerary_apr2026.html">출장 일정표</a>
        <a class="sub-link" href="IDN_SG_HR.html">인사 정보</a>
        <a class="sub-link" href="IDN_SG_Finance.html">재무 실적</a>
      </div>
    </section>

    <div class="footer">Landing page → IDN_SG_Portal</div>
  </main>
</body>
</html>
