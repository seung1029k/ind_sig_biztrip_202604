<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="refresh" content="0; url=IDN_SG_Portal.html">
  <title>Mirae Asset Portal</title>
  <style>
    :root {
      --navy: #16233f;
      --orange: #f37321;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #fff3ea 0, var(--bg) 48%, #eef2f8 100%);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      color: var(--navy);
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.65;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }
    .primary {
      background: var(--orange);
      color: #fff;
    }
    .secondary {
      background: #eef2ff;
      color: var(--navy);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mirae Asset Portal</h1>
    <p>포털 페이지로 자동 이동합니다. 이동하지 않으면 아래 버튼을 눌러 주세요.</p>
    <div class="actions">
      <a class="primary" href="IDN_SG_Portal.html">포털 열기</a>
      <a class="secondary" href="trip_itinerary_apr2026.html">출장 일정표</a>
    </div>
  </main>
</body>
</html>
